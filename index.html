<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>onni &lt;&gt; Maveron — Working Session</title>
<link rel="stylesheet" href="fonts-embed.css">
<style>
:root{
  /* v5 Unified — onni tokens */
  --cream:#FCFAF5; --canvas:#F3F0E8; --card:#FFFFFF; --card-warm:#FBF9F3;
  --ink:#1A1A17; --ink-soft:#6E6C63; --ink-faint:#A9A69B;
  --hair:rgba(26,26,23,.10); --hair-2:rgba(26,26,23,.06);
  --salmon:#FA8A72; --salmon-2:#F0765C; --salmon-soft:rgba(250,138,114,.15);
  --lime:#C4E43F; --slate:#585D66; --sage:#7E9A6B;
  --shadow:0 1px 2px rgba(26,26,23,.04), 0 18px 40px -24px rgba(26,26,23,.22);
  --shadow-sm:0 1px 2px rgba(26,26,23,.05), 0 8px 22px -16px rgba(26,26,23,.18);
  --dark-ticket:linear-gradient(155deg,#2b2b26 0%,#1a1a16 55%,#0f0f0d 100%);
  --r-hero:30px; --r-card:22px; --r-inset:14px; --r-pill:999px;
  --wm-ink:#1A1A17; --wm-dot:var(--salmon);
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:var(--sans); background:#1c1b18; color:var(--ink);
  overflow:hidden; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
/* ===== stage / scaling ===== */
#viewport{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 120% at 50% 0%,#26241f 0%,#141310 70%);}
#stage{width:1280px;height:720px;position:relative;transform-origin:center center;box-shadow:0 40px 120px -30px rgba(0,0,0,.7);border-radius:8px;overflow:hidden;background:var(--cream)}
.slide{position:absolute;inset:0;padding:52px 64px 40px;background:var(--cream);opacity:0;visibility:hidden;transition:opacity .45s ease;display:flex;flex-direction:column}
.slide.active{opacity:1;visibility:visible;z-index:2}
.slide.dark{background:#141310;color:#F4F2EC;--wm-ink:#F4F2EC;--ink:#F4F2EC;--ink-soft:rgba(244,242,236,.62);--ink-faint:rgba(244,242,236,.4);--hair:rgba(244,242,236,.12);--card:#1e1d19;--card-warm:#1e1d19}

/* ===== brand bar / footer ===== */
.brandbar{position:absolute;top:44px;left:64px;z-index:5}
.onni{display:inline-block;line-height:0}
.onni .st{fill:none;stroke:var(--wm-ink);stroke-width:8;stroke-linecap:round;stroke-linejoin:round}
.onni .dt{fill:var(--wm-dot)}
.foot{position:absolute;left:64px;right:64px;bottom:26px;display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);z-index:5}
.foot .pg{font-variant-numeric:tabular-nums}

/* ===== type helpers ===== */
.k{font-family:var(--mono);font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--salmon);font-weight:500;margin:0}
.k.muted{color:var(--ink-faint)}
h1.title{font-weight:700;font-size:33px;line-height:1.12;letter-spacing:-.02em;margin:10px 0 0;max-width:1000px}
.accent{color:var(--salmon)}
.head{margin-top:6px}
.head h1.title{margin-top:12px}

/* ===== components ===== */
.card{background:var(--card);border:1px solid var(--hair);border-radius:var(--r-card);box-shadow:var(--shadow-sm)}
.pill{display:inline-flex;align-items:center;gap:8px;padding:7px 14px;border-radius:var(--r-pill);font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:500}
.pill.salmon{background:var(--salmon-soft);color:var(--salmon-2)}
.pill.dark{background:var(--ink);color:var(--cream)}
.pill.ghost{border:1px solid var(--hair);color:var(--ink-soft)}
.num-badge{width:46px;height:46px;border-radius:50%;background:var(--salmon-soft);color:var(--salmon-2);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:500;font-size:14px;flex:0 0 auto}
.content{flex:1;min-height:0;display:flex;flex-direction:column}

/* build reveal — uses `translate` so elements' own transforms are preserved */
.build{opacity:0;translate:0 16px;transition:opacity .5s cubic-bezier(.22,.61,.36,1),translate .5s cubic-bezier(.22,.61,.36,1)}
.build.in{opacity:1;translate:0 0}

/* decorative concentric rings */
.rings{position:absolute;pointer-events:none}

/* progress bar */
#progress{position:fixed;left:0;bottom:0;height:3px;background:var(--salmon);width:0;z-index:50;transition:width .4s ease;box-shadow:0 0 12px rgba(250,138,114,.6)}
#hint{position:fixed;right:16px;bottom:14px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:rgba(255,255,255,.4);z-index:50;text-transform:uppercase;transition:opacity .6s ease}

/* ---------- utility layout ---------- */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:22px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.row{display:flex}
.spread{justify-content:space-between}
.mono-lab{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--salmon);font-weight:500}
.soft{color:var(--ink-soft)}
.faint{color:var(--ink-faint)}
.tnum{font-variant-numeric:tabular-nums}

/* S1 title */
.s1-title{font-weight:800;font-size:74px;letter-spacing:-.03em;line-height:1;display:flex;align-items:center;gap:20px}
.s1-title .lt{color:var(--salmon);font-weight:700}

/* check card */
.checkcard{display:flex;align-items:center;gap:22px;padding:30px 34px}
.checkcard .ck{width:56px;height:56px;border-radius:50%;background:var(--salmon-soft);display:flex;align-items:center;justify-content:center;color:var(--salmon-2);flex:0 0 auto}
.checkcard h3{margin:0;font-size:23px;font-weight:700;letter-spacing:-.01em}
.checkcard p{margin:4px 0 0;color:var(--ink-soft);font-size:15px}

/* logo card (s4) */
.logocard{padding:20px 22px 22px;display:flex;flex-direction:column;min-height:238px}
.logocard .lc-logo{flex:1;display:flex;align-items:center;justify-content:center;margin:8px 0 16px;height:92px;overflow:visible}
.logocard .lc-logo img{max-width:90%;max-height:84px;object-fit:contain}
.logocard p{margin:0;font-size:13px;line-height:1.45;color:var(--ink-soft)}

.blackbar{background:var(--dark-ticket);color:#fff;border-radius:16px;padding:20px;text-align:center;font-size:21px;font-weight:700;letter-spacing:-.01em}

/* s5 hub */
.hub{position:relative;flex:1;margin-top:16px}
.hub .you{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:150px;height:150px;border-radius:50%;border:3px solid var(--salmon);display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;color:var(--salmon);letter-spacing:.02em;background:var(--cream);z-index:3}
.hub-card{position:absolute;width:315px;background:var(--card);border:1px solid var(--hair);border-radius:16px;box-shadow:var(--shadow-sm);padding:15px 18px;z-index:2}
.hub-card .hc-k{font-family:var(--mono);font-size:10px;letter-spacing:.13em;color:var(--salmon);text-transform:uppercase;margin:0 0 3px}
.hub-card h4{margin:0 0 5px;font-size:16px;font-weight:700;letter-spacing:-.01em}
.hub-card p{margin:0;font-size:11.5px;line-height:1.4;color:var(--ink-soft)}
.spoke{position:absolute;height:1.5px;background:var(--hair);transform-origin:left center;z-index:1}

/* dashed placeholder */
.placeholder{flex:1;border:1.5px dashed var(--ink-faint);border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.placeholder h3{margin:0;font-size:26px;font-weight:700}
.placeholder p{margin:0;color:var(--ink-soft)}

/* s7 */
.datacard{padding:20px 22px;display:flex;flex-direction:column}
.datacard h3{margin:0;font-family:var(--mono);font-size:16px;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:9px}
.datacard h3::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--ink)}
.datacard .sub{color:var(--ink-faint);font-size:13.5px;margin:3px 0 13px}
.datacard ul{list-style:none;padding:0;margin:0 0 13px;display:flex;flex-direction:column;gap:9px}
.datacard li{font-size:14.5px;line-height:1.45;position:relative;padding-left:16px;color:var(--ink-soft)}
.datacard li::before{content:"";position:absolute;left:0;top:7px;width:5px;height:5px;border-radius:50%;background:var(--salmon)}
.datacard li b{color:var(--ink);font-weight:700}
.socan{border-top:1px solid var(--hair);padding-top:12px;margin-top:auto}
.socan .lab{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--ink-faint);text-transform:uppercase}
.socan p{margin:4px 0 12px;font-size:13.5px;color:var(--ink-soft);line-height:1.45}
.moves{display:block;text-align:center;padding:11px;border-radius:var(--r-pill);font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:500}
.moves.salmon{background:var(--salmon);color:#fff}
.moves.dark{background:var(--ink);color:var(--cream)}
.bigfig{font-size:66px;font-weight:800;color:var(--salmon);letter-spacing:-.03em;line-height:.9}
.brandgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.brandgrid .bl{border:1px solid var(--hair);border-radius:12px;height:72px;display:flex;align-items:center;justify-content:center;background:var(--card)}
.brandgrid .bl img{max-width:84%;max-height:46px;object-fit:contain}

/* s8 AB */
.abcard{padding:28px 32px;display:flex;flex-direction:column}
.abcard .letter{font-size:38px;font-weight:800;color:var(--salmon);line-height:1}
.abcard h3{margin:12px 0 16px;font-size:25px;font-weight:700;letter-spacing:-.01em}
.abrow{border-top:1px solid var(--hair);padding-top:13px;margin-top:13px}
.abrow:first-of-type{border-top:none;margin-top:0}
.abrow .rk{font-family:var(--mono);font-size:10.5px;letter-spacing:.13em;color:var(--salmon);text-transform:uppercase;margin:0 0 5px}
.abrow p{margin:0;font-size:15px;line-height:1.5;color:var(--ink-soft)}
.abrow p b{color:var(--ink);font-weight:700}

/* full bleed image */
.fullimg{position:absolute;inset:0;background:#eae7df}
.fullimg img{width:100%;height:100%;object-fit:cover}

/* s10 econ */
.econ-cards{display:grid;grid-template-columns:repeat(9,auto);align-items:center;justify-content:center;gap:4px;margin-top:8px}
.econ-card{background:var(--card);border:1px solid var(--hair);border-radius:16px;box-shadow:var(--shadow-sm);padding:18px 14px;text-align:center;width:150px;min-height:118px;display:flex;flex-direction:column;justify-content:center}
.econ-card .ef{font-size:30px;font-weight:800;letter-spacing:-.02em}
.econ-card.hl .ef{color:var(--salmon)}
.econ-card .es{font-size:11.5px;color:var(--ink-soft);margin-top:5px;line-height:1.3}
.econ-card .foot-note{font-family:var(--mono);font-size:8px;color:var(--ink-faint);margin-top:6px;line-height:1.3}
.times{font-size:22px;color:var(--ink-faint);font-weight:400}
.eq-row{display:flex;align-items:center;gap:14px;padding:11px 18px;border-radius:14px}
.eq-row.hl{background:var(--salmon-soft);border:1px solid rgba(250,138,114,.35)}
.eq-formula{font-family:var(--mono);font-size:14.5px;color:var(--ink-soft);flex:1;line-height:1.55}
.eq-formula b{color:var(--ink);font-weight:700}
.eq-eq{font-family:var(--mono);color:var(--salmon);font-weight:600;font-size:18px}
.eq-res{font-size:30px;font-weight:800;letter-spacing:-.02em;width:110px;text-align:right}
.eq-row.hl .eq-res{color:var(--salmon)}
.eq-subs{font-family:var(--mono);font-size:13px;color:var(--ink-faint);width:104px;text-align:right}

/* s11 mass market cards */
.mmcard{padding:22px 22px 20px;display:flex;flex-direction:column}
.mmcard .mk{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--salmon);text-transform:uppercase;margin:0 0 10px}
.mmcard h3{margin:0 0 14px;font-size:16px;font-weight:700;line-height:1.3;letter-spacing:-.01em}
.mmshot{margin-top:auto;border-radius:12px;overflow:hidden;border:1px solid var(--hair);background:var(--card-warm);position:relative;height:214px}
.mmshot img{width:100%;height:100%;object-fit:cover;object-position:top}
.mmshot.stack img{position:absolute;width:86%;height:auto;border-radius:8px;box-shadow:0 8px 24px -10px rgba(0,0,0,.4);border:1px solid var(--hair)}
.mmshot .a{top:12px;left:8px} .mmshot .b{bottom:12px;right:8px}

/* s12 pricing */
.pricecol{padding:20px 22px 20px;display:flex;flex-direction:column}
.pricecol .pc-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.pricecol .pc-name{font-size:22px;font-weight:800;letter-spacing:-.01em}
.pricecol .pc-price{font-family:var(--mono);font-size:19px;font-weight:600}
.pricecol .pc-adv{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:14px}
.pline{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-top:1px solid var(--hair)}
.pline .pl-l b{font-size:13px;font-weight:700;display:block}
.pline .pl-l span{font-size:11px;color:var(--ink-soft);display:block;margin-top:2px}
.pline .pl-r{font-family:var(--mono);font-size:12px;color:var(--salmon-2);white-space:nowrap;font-weight:500}
.psum{margin-top:auto;background:var(--salmon-soft);border-radius:12px;padding:12px 14px}
.pline:last-of-type{margin-bottom:12px}
.psum .lab{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--salmon-2)}
.psum .big{font-size:22px;font-weight:800;color:var(--salmon-2);margin-top:2px}
.psum .note{font-size:11px;color:var(--ink-soft);margin-left:6px;font-weight:500}
.pricecol.us{background:var(--salmon);color:#fff;border:none}
.pricecol.us .pc-adv,.pricecol.us .pl-l span{color:rgba(255,255,255,.8)}
.pricecol.us .pline{border-top-color:rgba(255,255,255,.22)}
.pricecol.us .pl-r{color:#fff}
.pricecol.us .psum{background:rgba(255,255,255,.16)}
.pricecol.us .psum .lab,.pricecol.us .psum .big{color:#fff}
.pricecol.us .psum .note{color:rgba(255,255,255,.85)}

/* s14 split */
.split{display:grid;grid-template-columns:340px 1fr;gap:0;flex:1;margin:0 -64px -40px;overflow:hidden}
.split .left{background:var(--dark-ticket);color:#F4F2EC;padding:48px 40px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center}
.split .left h2{font-size:27px;font-weight:700;line-height:1.22;letter-spacing:-.01em;margin:14px 0 0}
.split .right{padding:40px 56px;display:flex;flex-direction:column;justify-content:center;gap:0}
.prow{display:grid;grid-template-columns:52px 1fr;gap:16px;padding:18px 0;border-top:1px solid var(--hair)}
.prow:first-child{border-top:none}
.prow .pn{font-family:var(--mono);font-size:20px;color:var(--ink-faint);font-weight:500}
.prow .pk{font-family:var(--mono);font-size:12px;letter-spacing:.13em;color:var(--salmon);text-transform:uppercase;margin:0 0 6px}
.prow p{margin:0;font-size:14.5px;line-height:1.45}
.prow p b{font-weight:700} .prow p .g{color:var(--ink-soft)}

/* s15 gantt */
.gantt{flex:1;position:relative;margin-top:10px}
.g-axis{display:grid;grid-template-columns:150px repeat(8,1fr);font-family:var(--mono);font-size:10px;color:var(--ink-faint);letter-spacing:.06em;padding-bottom:6px;border-bottom:1px solid var(--hair)}
.g-lane{display:grid;grid-template-columns:150px 1fr;border-bottom:1px solid var(--hair-2);min-height:0}
.g-lane .lane-name{font-size:12.5px;font-weight:700;padding:10px 8px 10px 0;align-self:center}
.g-lane .lane-name small{display:block;font-weight:500;color:var(--ink-faint);font-size:9px;font-family:var(--mono);letter-spacing:.05em;margin-top:2px}
.lane-track{position:relative}
.chip{position:absolute;background:var(--card);border:1px solid var(--hair);border-radius:10px;padding:5px 10px;font-size:11px;font-weight:600;white-space:nowrap;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:6px;top:50%;transform:translateY(-50%)}
.chip::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--salmon);flex:0 0 auto}
.chip.dark{background:var(--ink);color:var(--cream);border:none}
.chip.dark::before{background:var(--salmon)}
.chip.dashed{background:transparent;border:1px dashed var(--salmon);box-shadow:none;color:var(--salmon-2);font-family:var(--mono);font-size:10px;letter-spacing:.04em}
.chip.dashed::before{display:none}
.phase-marker{position:absolute;top:0;border-radius:var(--r-pill);padding:6px 16px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;transform:translateX(-50%);z-index:4}
.band{position:absolute;top:26px;bottom:0;background:rgba(250,138,114,.08);z-index:0}
.phase-lab{position:absolute;font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--salmon-2);top:30px}
.vline{position:absolute;top:26px;bottom:0;width:1px;border-left:1px dashed rgba(250,138,114,.55);z-index:1}
.arr-chip{position:absolute;background:var(--salmon);color:#fff;border-radius:14px;padding:10px 16px;text-align:center;z-index:5;box-shadow:var(--shadow)}
.arr-chip .b{font-size:19px;font-weight:800;letter-spacing:-.01em}
.arr-chip .s{font-family:var(--mono);font-size:8px;letter-spacing:.14em}
.ribbon{position:absolute;background:var(--salmon-soft);color:var(--salmon-2);font-family:var(--mono);font-size:9.5px;letter-spacing:.05em;padding:4px 12px;border-radius:8px;text-transform:uppercase;white-space:nowrap;bottom:4px}
.callout{position:absolute;top:50%;transform:translateY(-50%);background:var(--card);border:1.5px solid var(--salmon);border-radius:12px;padding:8px 13px;box-shadow:var(--shadow-sm);white-space:nowrap;z-index:3}
.callout .ck{font-family:var(--mono);font-size:8.5px;color:var(--salmon-2);letter-spacing:.12em;text-transform:uppercase}
.callout .cl{font-size:12px;font-weight:700;margin-top:2px}

/* s16 story chart */
.story{flex:1;display:flex;align-items:flex-end;gap:0;position:relative;margin-top:8px}
.signals{display:flex;gap:12px;position:absolute;left:0;bottom:150px;z-index:3}
.sig{background:var(--card-warm);border:1px solid var(--hair);border-radius:14px;padding:14px 16px;text-align:center;width:118px}
.sig .sf{font-size:30px;font-weight:800;letter-spacing:-.02em}
.sig .ss{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin-top:4px;line-height:1.3}
.bars{position:absolute;right:0;bottom:88px;left:520px;height:310px;display:flex;align-items:flex-end;gap:10px}
.bar{flex:1;background:linear-gradient(180deg,var(--salmon) 0%,var(--salmon-2) 100%);border-radius:5px 5px 0 0;transition:height 1s cubic-bezier(.2,.7,.3,1);opacity:.9}
.baseline{position:absolute;left:0;right:0;bottom:88px;height:2px;background:var(--ink)}

/* s17 vision graphic */
.vision-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:0}

/* s18 thank you */
.thanks{font-size:66px;font-weight:800;letter-spacing:-.03em}

/* s19 appendix */
.appendix{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.appendix .word{font-size:48px;font-weight:800;letter-spacing:-.02em}

/* s20 doctors */
.loop{padding:20px 22px;display:flex;flex-direction:column;gap:0}
.loop .lk{font-family:var(--mono);font-size:10px;letter-spacing:.13em;color:var(--salmon);text-transform:uppercase;text-align:center;margin-bottom:14px}
.loop .box{border:1px solid var(--hair);border-radius:12px;padding:12px;text-align:center;font-family:var(--mono);letter-spacing:.14em;font-weight:600;font-size:15px}
.loop .box.dark{background:var(--dark-ticket);color:#fff;border:none;display:flex;align-items:center;justify-content:center;gap:10px}
.loop .cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:14px 0}
.loop .cols .ck{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:7px}
.loop .cols p{margin:0 0 8px;font-size:11px;line-height:1.4;color:var(--ink-soft)}
.loop .cols p b{color:var(--ink);font-weight:700}
.mockgrid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto;gap:10px}

}
function next(){
  const w = curFrame();
  if(w){ try{ if(w.__next && w.__next()) return; }catch(e){} }
  if(step<totalSteps(cur)){ step++; applySteps(); updateProgress(); }
  else if(cur<slides.length-1){
    show(cur+1);
    const w2 = curFrame(); if(w2){ try{ w2.__goto && w2.__goto(0); }catch(e){} }
  }
}
function prev(){
  const w = curFrame();
  if(w){ try{ if(w.__prev && w.__prev()) return; }catch(e){} }
  if(step>0){ step--; applySteps(); updateProgress(); }
  else if(cur>0){
    show(cur-1); step=totalSteps(cur); applySteps(); updateProgress();
    const w2 = curFrame(); if(w2){ try{ w2.__goto && w2.__goto(w2.__max||0); }catch(e){} }
  }
}
window.__deckNext = next; window.__deckPrev = prev;
function updateProgress(){
  let done=0,tot=0;
  for(let i=0;i<slides.length;i++){ tot+=totalSteps(i)+1; done+= (i<cur? totalSteps(i)+1 : (i===cur? step+1:0)); }
  document.getElementById('progress').style.width=(done/tot*100)+'%';
}

document.addEventListener('keydown',e=>{
  if(['ArrowRight','ArrowDown',' ','PageDown'].includes(e.key)){e.preventDefault();next();}
  else if(['ArrowLeft','ArrowUp','PageUp'].includes(e.key)){e.preventDefault();prev();}
  else if(e.key==='Home'){show(0);}
  else if(e.key==='End'){show(slides.length-1);}
  else if(e.key==='f'||e.key==='F'){ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
});
document.getElementById('viewport').addEventListener('click',e=>{ next(); });
let hintTimer=setTimeout(()=>{document.getElementById('hint').style.opacity='0';},5000);

/* ===== fit to viewport ===== */
function fit(){
  const s=Math.min(window.innerWidth/1280, window.innerHeight/720);
  stage.style.transform=`scale(${s})`;
}
window.addEventListener('resize',fit); fit();
show(0);
</script>
</body>
